name: "🔭 GitOps Horizon — Local Validation & Self-Healing Engine"

on:
  pull_request:
    branches: [main]
    paths:
      - "charts/**"
      - "config/**"
      - "engine/**"
  workflow_dispatch:      # Allow manual trigger for demo/testing

# Prevent concurrent runs on the same PR branch
concurrency:
  group: horizon-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate-and-heal:
    name: "Deploy → Detect → Heal → Verify"
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Required for the auto-commit step
      pull-requests: write   # Required for PR status comments

    env:
      CHART_PATH: ./charts/sample-app
      VALUES_FILE: ./config/cluster-values.yaml
      RELEASE_NAME: local-release
      NAMESPACE: default

    steps:
      # ────────────────────────────────────────────────────────────────────
      # Step 1 — Checkout with full history for git push on fix commits
      # ────────────────────────────────────────────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      # ────────────────────────────────────────────────────────────────────
      # Step 2 — Spin up a free ephemeral Kind cluster on the runner
      # Kind uses Docker (pre-installed on ubuntu-latest) — zero cost.
      # ────────────────────────────────────────────────────────────────────
      - name: "☸️  Instantiate Free Local Kind Cluster"
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: horizon-cluster
          wait: 120s

      # ────────────────────────────────────────────────────────────────────
      # Step 3 — Install Helm (latest stable)
      # ────────────────────────────────────────────────────────────────────
      - name: "🪖 Install Helm"
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      # ────────────────────────────────────────────────────────────────────
      # Step 4 — Smoke-test the cluster and tool availability
      # ────────────────────────────────────────────────────────────────────
      - name: "🩺 Validate Cluster Health"
        run: |
          echo "=== kubectl cluster-info ==="
          kubectl cluster-info
          echo ""
          echo "=== kubectl get nodes ==="
          kubectl get nodes -o wide
          echo ""
          echo "=== helm version ==="
          helm version
          echo ""
          echo "=== helm lint (pre-flight chart check) ==="
          helm lint ${{ env.CHART_PATH }}

      # ────────────────────────────────────────────────────────────────────
      # Step 5 — Attempt deployment against local Kind cluster.
      # The intentionally broken cluster-values.yaml will trigger a failure.
      # Errors are captured to runtime_error.log; DEPLOY_FAILED is set in
      # GITHUB_ENV so downstream steps can conditionally branch.
      # ────────────────────────────────────────────────────────────────────
      - name: "🚀 Execute Deployment (Expect Failure on Broken Config)"
        id: initial_deploy
        run: |
          echo "Attempting helm deploy with cluster-values.yaml ..."
          if helm upgrade --install \
              ${{ env.RELEASE_NAME }} ${{ env.CHART_PATH }} \
              -f ${{ env.VALUES_FILE }} \
              --namespace ${{ env.NAMESPACE }} \
              --create-namespace \
              --timeout 90s \
              --wait \
              --rollback-on-failure \
              2> runtime_error.log; then
            echo "DEPLOY_FAILED=false" >> "$GITHUB_ENV"
            echo "✅ Deployment succeeded on first attempt — chart is already healthy."
          else
            echo "DEPLOY_FAILED=true" >> "$GITHUB_ENV"
            echo ""
            echo "⚠️  Deployment failed. Captured error log:"
            cat runtime_error.log
          fi

      # ────────────────────────────────────────────────────────────────────
      # Step 6 — Upload the raw error log as an artifact for audit
      # ────────────────────────────────────────────────────────────────────
      - name: "📋 Upload Raw Error Log"
        if: env.DEPLOY_FAILED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: runtime-error-log
          path: runtime_error.log
          retention-days: 14

      # ────────────────────────────────────────────────────────────────────
      # Step 7 — Install Python dependencies for the engine
      # ────────────────────────────────────────────────────────────────────
      - name: "🐍 Install Engine Dependencies"
        if: env.DEPLOY_FAILED == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ────────────────────────────────────────────────────────────────────
      # Step 8 — Run the self-healing engine:
      #   executor.py  → parse error, detect kind, look up docs URL
      #   brain.py     → TinyFish fetch + Gemini Flash-Lite remediation
      #   remediate.py → patch cluster-values.yaml + write report
      # ────────────────────────────────────────────────────────────────────
      - name: "🤖 Run Dynamic Adaptation & Healing Loop"
        if: env.DEPLOY_FAILED == 'true'
        env:
          TINYFISH_API_KEY: ${{ secrets.TINYFISH_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: "gemini-2.5-flash-lite"   # 1,000 RPD free tier; fallback: gemini-2.5-flash
        run: |
          echo "Starting GitOps Horizon remediation engine ..."
          python -m engine.remediate --log-file runtime_error.log

      # ────────────────────────────────────────────────────────────────────
      # Step 9 — Re-validate: re-deploy the AI-patched manifest against the
      # same live Kind cluster to confirm the fix is real, not theoretical.
      # ────────────────────────────────────────────────────────────────────
      - name: "✅ Re-Verify Patched Manifest on Local Cluster"
        if: env.DEPLOY_FAILED == 'true'
        run: |
          echo "Re-deploying with AI-patched cluster-values.yaml ..."
          helm upgrade --install \
            ${{ env.RELEASE_NAME }} ${{ env.CHART_PATH }} \
            -f ${{ env.VALUES_FILE }} \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --timeout 120s \
            --wait
          echo ""
          echo "=== Deployed resources ==="
          kubectl get all -n ${{ env.NAMESPACE }}

      # ────────────────────────────────────────────────────────────────────
      # Step 10 — Upload the Markdown diagnostic report as a CI artifact
      # ────────────────────────────────────────────────────────────────────
      - name: "📊 Upload Diagnostic Report"
        if: env.DEPLOY_FAILED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: horizon-diagnostic-report
          path: reports/
          retention-days: 30

      # ────────────────────────────────────────────────────────────────────
      # Step 11 — Commit the patched values + report back to the PR branch.
      # This creates a self-healing commit that developers can review and merge.
      # ────────────────────────────────────────────────────────────────────
      - name: "💾 Commit Remediated Assets to PR Branch"
        if: env.DEPLOY_FAILED == 'true'
        run: |
          git config --global user.name  "Horizon Agent 🤖"
          git config --global user.email "horizon-agent@gitops-horizon.local"

          git add config/cluster-values.yaml reports/

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No file changes detected — skipping commit."
          else
            git commit -m "fix(gitops-horizon): auto-remediated Helm manifest drift

          The GitOps Horizon self-healing engine detected a deployment failure,
          fetched condensed Kubernetes documentation via TinyFish, synthesised
          a fix using Gemini Flash-Lite, validated the patch against the local
          Kind cluster, and committed this correction automatically.

          See reports/ for the full diagnostic trace."

            git push origin HEAD:${{ github.head_ref }}
            echo "✅ Patched files committed and pushed to PR branch."
          fi

      # ────────────────────────────────────────────────────────────────────
      # Step 12 — Final pipeline summary
      # ────────────────────────────────────────────────────────────────────
      - name: "📝 Pipeline Summary"
        if: always()
        run: |
          echo "## 🔭 GitOps Horizon Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "$DEPLOY_FAILED" == "true" ]]; then
            echo "| Step | Outcome |" >> $GITHUB_STEP_SUMMARY
            echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
            echo "| Initial Deploy | ❌ Failed (intentional) |" >> $GITHUB_STEP_SUMMARY
            echo "| TinyFish Fetch | ✅ Docs compressed |" >> $GITHUB_STEP_SUMMARY
            echo "| Gemini Remediation | ✅ Patch generated |" >> $GITHUB_STEP_SUMMARY
            echo "| Re-deploy Validation | ✅ Clean exit |" >> $GITHUB_STEP_SUMMARY
            echo "| Auto-commit | ✅ Fix committed to PR |" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Chart deployed successfully with no remediation needed." >> $GITHUB_STEP_SUMMARY
          fi
